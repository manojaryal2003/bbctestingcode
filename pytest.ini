# =============================================================================
# pytest configuration for BBC School Management System Regression Suite
# =============================================================================

[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── HTML Report ───────────────────────────────────────────────────────────────
# Run with: pytest --html=reports/regression_report.html --self-contained-html
addopts =
    --html=reports/regression_report.html
    --self-contained-html
    --tb=short
    -v

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    auth:         Authentication tests (login, logout, protected routes)
    admin:        Head Admin role tests
    franchise:    Franchise Admin role tests
    mentor:       Mentor role tests
    student:      Student role tests
    parent:       Parent role tests
    smoke:        Quick smoke tests — run first to verify basic health
    regression:   Full regression suite

# ── Logging ──────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
